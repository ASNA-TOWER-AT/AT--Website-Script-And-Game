<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AT Script Hub</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#0f0f0f;color:white}

#logo{
text-align:center;
font-size:60px;
margin:20px;
color:#00ffc8;
}

nav{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap
}

nav button{
padding:10px 20px;
border:none;
background:#00ffc8;
font-weight:bold;
cursor:pointer;
border-radius:5px
}

.page{display:none;padding:20px}
.active{display:block}

.grid{
display:flex;
flex-direction:column;
gap:15px
}

.card{
display:flex;
gap:15px;
background:#1c1c1c;
padding:10px;
border-radius:10px;
box-shadow:0 0 10px #00ffc8
}

.card img{
width:150px;
height:100px;
object-fit:cover
}

input,textarea,select{
width:100%;
padding:8px;
margin-top:5px;
background:#222;
border:none;
border-radius:5px;
color:white
}

.uploadBtn{
margin-top:10px;
padding:10px;
background:#00ffc8;
border:none;
font-weight:bold;
cursor:pointer
}

</style>
</head>

<body>

<div id="logo">AT™ Script Hub</div>

<nav>
<button onclick="showPage('games')">Games</button>
<button onclick="showPage('scripts')">Scripts</button>
<button onclick="showPage('upload')">Upload</button>
<button onclick="showPage('login')">Login</button>
</nav>

<!-- LOGIN -->

<div id="login" class="page">

<h2>Login / Register</h2>

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button onclick="register()">Register</button>

<button onclick="login()">Login</button>

<p id="loginMsg"></p>

</div>

<!-- GAMES -->

<div id="games" class="page active">

<h2>Games</h2>

<div id="gameList" class="grid"></div>

</div>

<!-- SCRIPTS -->

<div id="scripts" class="page">

<h2>Scripts</h2>

<div id="scriptList" class="grid"></div>

</div>

<!-- UPLOAD -->

<div id="upload" class="page">

<h2>Upload</h2>

<select id="uploadType">
<option value="game">Game</option>
<option value="script">Script</option>
</select>

<input id="itemName" placeholder="Nama">

<input id="itemLink" placeholder="Link Game">

<textarea id="itemCode" placeholder="Script code"></textarea>

<button class="uploadBtn" onclick="uploadItem()">Upload</button>

</div>

<!-- FIREBASE -->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"

import {
getFirestore,
collection,
addDoc,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"


const firebaseConfig = {
apiKey: "AIzaSyBZPDqoF3pqPvVXVigbfBlolHAakohx_VY",
authDomain: "at-data-174bc.firebaseapp.com",
projectId: "at-data-174bc",
storageBucket: "at-data-174bc.firebasestorage.app",
messagingSenderId: "278571146405",
appId: "1:278571146405:web:bb7fbacf8ec3fb54fec14c",
measurementId: "G-8PYQB40E2B"
}

const app = initializeApp(firebaseConfig)

const db = getFirestore(app)

const auth = getAuth(app)

let currentUser=null


window.showPage=function(page){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))

document.getElementById(page).classList.add("active")

}


window.register=async function(){

let email=document.getElementById("email").value
let pass=document.getElementById("password").value

try{

await createUserWithEmailAndPassword(auth,email,pass)

document.getElementById("loginMsg").innerText="Register sukses"

}catch(e){

document.getElementById("loginMsg").innerText=e.message

}

}


window.login=async function(){

let email=document.getElementById("email").value
let pass=document.getElementById("password").value

try{

let user=await signInWithEmailAndPassword(auth,email,pass)

currentUser=user.user.email

document.getElementById("loginMsg").innerText="Login sukses"

}catch(e){

document.getElementById("loginMsg").innerText=e.message

}

}


window.uploadItem=async function(){

if(!currentUser){

alert("Login dulu")

return

}

let type=document.getElementById("uploadType").value
let name=document.getElementById("itemName").value
let link=document.getElementById("itemLink").value
let code=document.getElementById("itemCode").value

await addDoc(collection(db,type+"s"),{

name:name,
link:link,
code:code,
owner:currentUser,
time:Date.now()

})

loadItems()

}


async function loadItems(){

let gameList=document.getElementById("gameList")
gameList.innerHTML=""

let games=await getDocs(collection(db,"games"))

games.forEach(doc=>{

let g=doc.data()

let card=document.createElement("div")

card.className="card"

card.innerHTML=`

<img src="https://via.placeholder.com/150">

<div>

<h3>${g.name}</h3>

<button onclick="window.open('${g.link}')">Play</button>

</div>

`

gameList.appendChild(card)

})


let scriptList=document.getElementById("scriptList")
scriptList.innerHTML=""

let scripts=await getDocs(collection(db,"scripts"))

scripts.forEach(doc=>{

let s=doc.data()

let card=document.createElement("div")

card.className="card"

card.innerHTML=`

<img src="https://via.placeholder.com/150">

<div>

<h3>${s.name}</h3>

<pre>${s.code}</pre>

</div>

`

scriptList.appendChild(card)

})

}

loadItems()

</script>

</body>
</html>
