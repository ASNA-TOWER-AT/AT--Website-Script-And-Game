<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AT Script Hub – FULL PRO MODE</title>

<style>
/* ==============================
   BASE STYLES (from original)
=============================== */
body{
background:#0f0f0f;
color:white;
font-family:Arial;
margin:0;
}

#logo{
font-size:60px;
text-align:center;
color:#00ffc8;
margin:20px;
}

nav{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
}

nav button{
padding:10px 20px;
background:#00ffc8;
border:none;
border-radius:5px;
cursor:pointer;
}

.page{
display:none;
padding:20px;
}

.active{
display:block;
}

.grid{
display:flex;
flex-direction:column;
gap:15px;
}

.card{
background:#1c1c1c;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px #00ffc8;
position:relative;
}

input,textarea,select{
width:100%;
padding:10px;
margin-top:5px;
background:#222;
border:none;
border-radius:5px;
color:white;
}

button{
margin-top:10px;
cursor:pointer;
}

.like-btn, .dislike-btn{
margin-right:5px;
cursor:pointer;
}
.comment-box{
margin-top:10px;
padding:10px;
background:#222;
border-radius:5px;
}
.comment-list{
margin-top:5px;
border-top:1px solid #00ffc8;
padding-top:5px;
}
.copy-btn{
position:absolute;
top:10px;
right:10px;
padding:5px 10px;
background:#00ffc8;
border:none;
border-radius:5px;
color:black;
font-weight:bold;
}
.search-input{
padding:10px;
margin-bottom:15px;
width:100%;
border-radius:5px;
border:none;
background:#222;
color:white;
}

/* ==============================
   HIGHLIGHT TRENDING
=============================== */
.trending{
border:2px solid #00ffc8;
}
</style>
</head>

<body>

<div id="logo">AT™</div>

<nav>
<button onclick="showPage('games')">Games</button>
<button onclick="showPage('scripts')">Scripts</button>
<button onclick="showPage('upload')">Upload</button>
<button onclick="showPage('profile')">Profile</button>
</nav>

<!-- LOGIN (hidden by default) -->
<div id="login" class="page">
<h2>Login / Register</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
<p id="loginMsg"></p>
</div>

<!-- GAMES -->
<div id="games" class="page active">
<h2>Games</h2>
<input class="search-input" placeholder="Search Games..." oninput="filterItems('games', this.value)">
<div id="gameList" class="grid"></div>
</div>

<!-- SCRIPTS -->
<div id="scripts" class="page">
<h2>Scripts</h2>
<input class="search-input" placeholder="Search Scripts..." oninput="filterItems('scripts', this.value)">
<div id="scriptList" class="grid"></div>
</div>

<!-- UPLOAD -->
<div id="upload" class="page">
<h2>Upload</h2>
<p>Login dibutuhkan untuk upload</p>
<select id="uploadType">
<option value="game">Game</option>
<option value="script">Script</option>
</select>
<input id="itemName" placeholder="Nama">
<input id="itemLink" placeholder="Link">
<textarea id="itemCode" placeholder="Script Code"></textarea>
<button onclick="uploadItem()">Upload</button>
</div>

<!-- PROFILE -->
<div id="profile" class="page">
<h2>Profile</h2>
<p id="profileEmail"></p>
<div id="userUploads" class="grid"></div>
</div>

<script type="module">

/* ==============================
   FIREBASE INIT (original + pro)
=============================== */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"
import {
getFirestore,
collection,
addDoc,
getDocs,
doc,
updateDoc,
deleteDoc,
query,
orderBy,
where,
onSnapshot,
increment
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"

const firebaseConfig = {
apiKey: "AIzaSyBZPDqoF3pqPvVXVigbfBlolHAakohx_VY",
authDomain: "at-data-174bc.firebaseapp.com",
projectId: "at-data-174bc",
storageBucket: "at-data-174bc.firebasestorage.app",
messagingSenderId: "278571146405",
appId: "1:278571146405:web:bb7fbacf8ec3fb54fec14c",
measurementId: "G-8PYQB40E2B"
}

const app = initializeApp(firebaseConfig)
const auth = getAuth(app)
const db = getFirestore(app)
let currentUser = null

/* ==============================
   PAGE NAVIGATION
=============================== */
window.showPage=function(page){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))
document.getElementById(page).classList.add("active")
if(page==='profile') loadUserUploads()
}

/* ==============================
   AUTH
=============================== */
window.register=async function(){
let email=document.getElementById("email").value
let pass=document.getElementById("password").value
try{
await createUserWithEmailAndPassword(auth,email,pass)
loginMsg.innerText="Register berhasil"
}catch(e){
loginMsg.innerText=e.message
}
}

window.login=async function(){
let email=document.getElementById("email").value
let pass=document.getElementById("password").value
try{
await signInWithEmailAndPassword(auth,email,pass)
loginMsg.innerText="Login berhasil"
}catch(e){
loginMsg.innerText=e.message
}
}

window.logout=function(){
signOut(auth)
}

onAuthStateChanged(auth,user=>{
currentUser=user
if(user) profileEmail.innerText="Email: "+user.email
})

/* ==============================
   UPLOAD
=============================== */
window.uploadItem=async function(){
if(!currentUser){
alert("Login dulu")
showPage('login')
return
}
let type=document.getElementById("uploadType").value
let name=document.getElementById("itemName").value
let link=document.getElementById("itemLink").value
let code=document.getElementById("itemCode").value
await addDoc(collection(db,type+"s"),{
name,link,code,user:currentUser.email,likes:0,dislikes:0,views:0,created:Date.now()
})
loadItems()
}

/* ==============================
   LOAD ITEMS (realtime)
=============================== */
async function loadItems(){
const gameList = document.getElementById("gameList")
const scriptList = document.getElementById("scriptList")

// GAMES
onSnapshot(collection(db,"games"),snap=>{
gameList.innerHTML=""
snap.docs.forEach(doc=>{
let g = doc.data()
let card = document.createElement("div")
card.className="card"
if(g.likes>5) card.classList.add("trending")
card.innerHTML=`
<h3>${g.name}</h3>
<button onclick="window.open('${g.link}')">Play</button>
<span class="like-btn" onclick="vote('${doc.id}','games','like')">👍 ${g.likes}</span>
<span class="dislike-btn" onclick="vote('${doc.id}','games','dislike')">👎 ${g.dislikes}</span>
<span>Views: ${g.views || 0}</span>
<div class="comment-box">
<input placeholder="Comment..." onchange="addComment('${doc.id}','games',this.value);this.value=''">
<div class="comment-list" id="comments-${doc.id}"></div>
</div>
`
gameList.appendChild(card)
loadComments(doc.id,'games')
})
})

// SCRIPTS
onSnapshot(collection(db,"scripts"),snap=>{
scriptList.innerHTML=""
snap.docs.forEach(doc=>{
let s = doc.data()
let card = document.createElement("div")
card.className="card"
if(s.likes>5) card.classList.add("trending")
card.innerHTML=`
<h3>${s.name}</h3>
<pre>${s.code}</pre>
<button class="copy-btn" onclick="copyCode('${s.code}')">COPY</button>
<span class="like-btn" onclick="vote('${doc.id}','scripts','like')">👍 ${s.likes}</span>
<span class="dislike-btn" onclick="vote('${doc.id}','scripts','dislike')">👎 ${s.dislikes}</span>
<span>Views: ${s.views || 0}</span>
<div class="comment-box">
<input placeholder="Comment..." onchange="addComment('${doc.id}','scripts',this.value);this.value=''">
<div class="comment-list" id="comments-${doc.id}"></div>
</div>
`
scriptList.appendChild(card)
loadComments(doc.id,'scripts')
})
})
}

/* ==============================
   LIKE / DISLIKE
=============================== */
window.vote = async function(id,type,action){
if(!currentUser) return alert("Login dulu")
const ref = doc(db,type,id)
if(action==='like') await updateDoc(ref,{likes:increment(1)})
if(action==='dislike') await updateDoc(ref,{dislikes:increment(1)})
}

/* ==============================
   COMMENTS
=============================== */
window.addComment=async function(id,type,text){
if(!currentUser || !text) return
await addDoc(collection(db,type+'/'+id+'/comments'),{
user:currentUser.email,text,time:Date.now()
})
loadComments(id,type)
}

async function loadComments(id,type){
const commentDiv = document.getElementById('comments-'+id)
if(!commentDiv) return
const snap = await getDocs(collection(db,type+'/'+id+'/comments'))
commentDiv.innerHTML=""
snap.forEach(doc=>{
const c = doc.data()
const el = document.createElement("div")
el.innerText = `${c.user}: ${c.text}`
commentDiv.appendChild(el)
})
}

/* ==============================
   COPY SCRIPT
=============================== */
window.copyCode=function(code){
navigator.clipboard.writeText(code)
alert("Code copied!")
}

/* ==============================
   FILTER
=============================== */
window.filterItems=function(type,query){
query = query.toLowerCase()
const list = document.getElementById(type+'List')
Array.from(list.children).forEach(c=>{
const name = c.querySelector('h3')?.innerText.toLowerCase() || ''
c.style.display = name.includes(query)?'block':'none'
})
}

/* ==============================
   PROFILE PAGE
=============================== */
async function loadUserUploads(){
if(!currentUser) return
const div = document.getElementById('userUploads')
div.innerHTML=""
const types = ['games','scripts']
for(const type of types){
const snap = await getDocs(query(collection(db,type),where('user','==',currentUser.email)))
snap.forEach(doc=>{
const item = doc.data()
const card = document.createElement('div')
card.className="card"
card.innerHTML=`
<h3>${item.name}</h3>
<button onclick="editItem('${doc.id}','${type}')">Edit</button>
<button onclick="deleteItem('${doc.id}','${type}')">Delete</button>
`
div.appendChild(card)
})
}
}

/* ==============================
   EDIT / DELETE
=============================== */
window.editItem=async function(id,type){
const newName = prompt("New Name?")
if(!newName) return
await updateDoc(doc(db,type,id),{name:newName})
}

window.deleteItem=async function(id,type){
if(confirm("Delete?")) await deleteDoc(doc(db,type,id))
}

loadItems()
</script>

</body>
</html>
