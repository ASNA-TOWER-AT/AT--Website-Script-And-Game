<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AT Script Hub V.1.0.0</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#0f0f0f;
color:white;
font-family:Arial, Helvetica, sans-serif;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
background:#111;
border-bottom:1px solid #00ffc8;
}

#logo{
font-size:28px;
color:#00ffc8;
font-weight:bold;
}

#version{
font-size:14px;
color:#00ffc8;
margin-left:10px;
}

#userBox{
display:flex;
align-items:center;
gap:10px;
}

#userPhoto{
width:35px;
height:35px;
border-radius:50%;
background:#00ffc8;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
color:black;
}

#userEmail{
font-size:13px;
opacity:0.8;
}

/* NAV */

nav{
display:flex;
justify-content:center;
gap:15px;
padding:15px;
flex-wrap:wrap;
}

nav button{
padding:10px 20px;
background:#00ffc8;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

nav button:hover{
opacity:0.8;
}

/* PAGE */

.page{
display:none;
padding:25px;
}

.active{
display:block;
}

.grid{
display:flex;
flex-direction:column;
gap:20px;
}

.card{
background:#1b1b1b;
padding:20px;
border-radius:12px;
box-shadow:0 0 15px #00ffc830;
position:relative;
}

.card h3{
margin:0 0 10px 0;
color:#00ffc8;
}

.meta{
font-size:12px;
opacity:0.7;
margin-bottom:10px;
}

.actions{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:10px;
}

button.action{
padding:8px 15px;
border:none;
border-radius:5px;
cursor:pointer;
font-size:13px;
}

.playBtn{ background:#00ffc8; }
.likeBtn{ background:#333; color:white; }
.editBtn{ background:#555; color:white; }
.deleteBtn{ background:#880000; color:white; }

input,textarea,select{
width:100%;
padding:10px;
margin-top:10px;
background:#222;
border:none;
border-radius:6px;
color:white;
}

textarea{
min-height:120px;
resize:vertical;
}

#toast{
position:fixed;
bottom:20px;
right:20px;
background:#00ffc8;
color:black;
padding:12px 20px;
border-radius:6px;
display:none;
font-weight:bold;
}

#loading{
position:fixed;
inset:0;
background:#000000aa;
display:none;
align-items:center;
justify-content:center;
font-size:22px;
color:#00ffc8;
z-index:100;
}

</style>
</head>

<body>

<header>
<div>
<span id="logo">AT™</span>
<span id="version">V.1.0.0</span>
</div>

<div id="userBox">
<div id="userPhoto">?</div>
<div id="userEmail">Not logged in</div>
</div>
</header>

<nav>
<button onclick="showPage('games')">Games</button>
<button onclick="showPage('scripts')">Scripts</button>
<button onclick="showPage('upload')">Upload</button>
<button onclick="showPage('login')">Login</button>
</nav>

<!-- LOGIN -->

<div id="login" class="page active">
<h2>Login / Register</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
<p id="loginMsg"></p>
</div>

<!-- GAMES -->

<div id="games" class="page">
<h2>Games</h2>
<div id="gameList" class="grid"></div>
</div>

<!-- SCRIPTS -->

<div id="scripts" class="page">
<h2>Scripts</h2>
<div id="scriptList" class="grid"></div>
</div>

<!-- UPLOAD -->

<div id="upload" class="page">
<h2>Upload</h2>

<select id="uploadType" onchange="toggleUploadForm()">
<option value="game">Game</option>
<option value="script">Script</option>
</select>

<input id="itemName" placeholder="Nama (Wajib)">
<input id="itemLink" placeholder="Link Game (Wajib untuk Game)">
<textarea id="itemCode" placeholder="Script Code (Wajib untuk Script)"></textarea>
<textarea id="itemDesc" placeholder="Deskripsi"></textarea>

<button onclick="uploadItem()">Upload</button>

</div>

<div id="toast"></div>
<div id="loading">Loading...</div>

<script type="module">

/* FIREBASE */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"

import {
getFirestore,
collection,
addDoc,
getDocs,
doc,
updateDoc,
deleteDoc,
increment,
setDoc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"

/* CONFIG */

const firebaseConfig = {
apiKey: "AIzaSyBZPDqoF3pqPvVXVigbfBlolHAakohx_VY",
authDomain: "at-data-174bc.firebaseapp.com",
projectId: "at-data-174bc",
storageBucket: "at-data-174bc.firebasestorage.app",
messagingSenderId: "278571146405",
appId: "1:278571146405:web:bb7fbacf8ec3fb54fec14c",
measurementId: "G-8PYQB40E2B"
}

/* INIT */

const app = initializeApp(firebaseConfig)
const auth = getAuth(app)
const db = getFirestore(app)

let currentUser = null

/* UI HELPERS */

function showToast(msg){
let t=document.getElementById("toast")
t.innerText=msg
t.style.display="block"
setTimeout(()=>{t.style.display="none"},2000)
}

function showLoading(state){
document.getElementById("loading").style.display=state?"flex":"none"
}

/* PAGE */

window.showPage=function(page){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))
document.getElementById(page).classList.add("active")
}

/* AUTH */

window.register=async function(){
let email=email.value
let pass=password.value
try{
await createUserWithEmailAndPassword(auth,email,pass)
loginMsg.innerText="Register berhasil"
}catch(e){ loginMsg.innerText=e.message }
}

window.login=async function(){
let email=document.getElementById("email").value
let pass=document.getElementById("password").value
try{
await signInWithEmailAndPassword(auth,email,pass)
loginMsg.innerText="Login berhasil"
}catch(e){ loginMsg.innerText=e.message }
}

window.logout=function(){
signOut(auth)
}

onAuthStateChanged(auth,user=>{
currentUser=user
if(user){
document.getElementById("userEmail").innerText=user.email
document.getElementById("userPhoto").innerText=user.email[0].toUpperCase()
}else{
document.getElementById("userEmail").innerText="Not logged in"
document.getElementById("userPhoto").innerText="?"
}
})

/* TOGGLE FORM */

window.toggleUploadForm=function(){
let type=document.getElementById("uploadType").value
document.getElementById("itemLink").style.display= type==="game"?"block":"none"
document.getElementById("itemCode").style.display= type==="script"?"block":"none"
}

toggleUploadForm()

</script>

</body>
</html>
